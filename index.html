<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE OPENING</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Space+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --white: #ffffff;
            --yellow: #FFF574; /* 기획안의 화사한 노란색 */
            --teal: #0BCBCE;   /* 기획안의 스타트 버튼 민트색 */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--white); overflow: hidden; font-family: 'Space Mono', monospace; }

        /* 인트로 전체 컨테이너 */
        #intro {
            position: fixed;
            inset: 0;
            z-index: 50;
            background: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 픽셀 입자가 그려질 캔버스 */
        #px-canvas {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        /* 화면 전체를 유기적으로 떠다닐 스타트 버튼 */
        #start-btn {
            position: absolute;
            z-index: 10;
            background: none;
            border: 2px solid var(--teal);
            color: var(--teal);
            font-family: 'Space Mono', monospace;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: .3em;
            padding: 12px 32px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.8s, transform 0.2s, background-color 0.2s;
            text-transform: uppercase;
            /* 초기 위치 중앙 근처 */
            left: 50%;
            top: 70%;
            transform: translate(-50%, -50%);
        }
        
        #start-btn.show { opacity: 1; }
        #start-btn.gone { opacity: 0 !important; pointer-events: none; }
        #start-btn:hover {
            color: #fff;
            border-color: #fff;
            background: rgba(11, 203, 206, 0.8);
            box-shadow: 0 0 15px rgba(11, 203, 206, 0.5);
        }
    </style>
</head>
<body>

    <div id="intro">
        <canvas id="px-canvas"></canvas>
        <button id="start-btn">START</button>
    </div>

    <script>
        const canvas = document.getElementById('px-canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');

        // 창 크기에 맞게 캔버스 설정
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // --- 1. 픽셀 타이포그래피 파티클 데이터 설정 ---
        // 고정밀 픽셀 텍스트를 그리기 위해 내부 가상 캔버스 사용
        const txtCanvas = document.createElement('canvas');
        const txtCtx = txtCanvas.getContext('2d');
        
        // 텍스트 매트릭스 추출
        txtCanvas.width = 160;
        txtCanvas.height = 40;
        txtCtx.font = "bold 24px 'VT323', monospace";
        txtCtx.fillStyle = "#000";
        txtCtx.textBaseline = "top";
        txtCtx.fillText("THE OPENING", 5, 8);

        const imgData = txtCtx.getImageData(0, 0, txtCanvas.width, txtCanvas.height);
        const particles = [];
        const pixelSize = 8; // 픽셀 사각형 크기 (조절해서 크기 변경 가능)

        // 화면 중앙 정렬을 위한 오프셋 계산
        const startX = (canvas.width - (txtCanvas.width * pixelSize)) / 2;
        const startY = (canvas.height - (txtCanvas.height * pixelSize)) / 2;

        // 검은색 픽셀이 있는 위치를 파악해 파티클 생성
        for (let y = 0; y < txtCanvas.height; y++) {
            for (let x = 0; x < txtCanvas.width; x++) {
                const alpha = imgData.data[(y * txtCanvas.width + x) * 4 + 3];
                if (alpha > 128) {
                    // 기획안 1~3컷처럼 사방에서 날아와 뭉치도록 무작위 시작점 지정
                    const angle = Math.random() * Math.PI * 2;
                    const distance = Math.max(canvas.width, canvas.height) * (Math.random() * 0.6 + 0.5);
                    
                    particles.push({
                        targetX: startX + x * pixelSize,
                        targetY: startY + y * pixelSize,
                        // 시작점은 화면 바깥 랜덤한 곳
                        x: canvas.width / 2 + Math.cos(angle) * distance,
                        y: canvas.height / 2 + Math.sin(angle) * distance,
                        speed: Math.random() * 0.03 + 0.015, // 모여드는 속도
                        size: pixelSize - 0.5 // 픽셀 간 경계선 살짝 주기
                    });
                }
            }
        }

        // --- 2. 애니메이션 루프 (픽셀 모으기) ---
        let animationDone = false;

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(255, 245, 116, 1)'; // var(--yellow)

            let allArrived = true;

            particles.forEach(p => {
                // 현재 위치에서 목적지(타이틀 완성 구역)로 스무스하게 이동 (감속 공식)
                const dx = p.targetX - p.x;
                const dy = p.targetY - p.y;
                
                p.x += dx * p.speed;
                p.y += dy * p.speed;

                // 픽셀 그리기
                ctx.fillRect(p.x, p.y, p.size, p.size);

                // 아직 덜 도착한 픽셀이 있는지 확인
                if (Math.abs(dx) > 0.5 || Math.abs(dy) > 0.5) {
                    allArrived = false;
                }
            });

            if (!allArrived) {
                requestAnimationFrame(animateParticles);
            } else {
                // 타이틀 완성 시 버튼 등장 및 움직임 시작
                animationDone = true;
                startBtn.classList.add('show');
                initButtonPhysics();
            }
        }

        // 인트로 애니메이션 실행
        setTimeout(animateParticles, 300);


        // --- 3. START 버튼 화면 전체 무작위 부유(Bounce) 스크립트 ---
        let btnX, btnY, vx, vy;
        let btnWidth, btnHeight;

        function initButtonPhysics() {
            // 버튼의 현재 크기 측정
            btnWidth = startBtn.offsetWidth;
            btnHeight = startBtn.offsetHeight;

            // 정중앙 근처 기본 위치 설정
            btnX = window.innerWidth / 2 - btnWidth / 2;
            btnY = window.innerHeight * 0.7 - btnHeight / 2;
            
            // 무작위 이동 속도 및 방향 (X, Y축 픽셀 속도)
            vx = (Math.random() - 0.5) * 4;
            vy = (Math.random() - 0.5) * 4;
            
            // 속도가 너무 느리면 최소 속도 부여
            if (Math.abs(vx) < 1) vx = vx < 0 ? -1.5 : 1.5;
            if (Math.abs(vy) < 1) vy = vy < 0 ? -1.5 : 1.5;

            // 둥둥 떠다니는 무한 루프 시작
            updateButtonPosition();
        }

        function updateButtonPosition() {
            if (!animationDone) return;

            // 위치 갱신
            btnX += vx;
            btnY += vy;

            // 화면 벽면 충돌 검사 (튕기기 연출)
            if (btnX <= 0) { btnX = 0; vx *= -1; }
            if (btnX + btnWidth >= window.innerWidth) { btnX = window.innerWidth - btnWidth; vx *= -1; }
            if (btnY <= 0) { btnY = 0; vy *= -1; }
            if (btnY + btnHeight >= window.innerHeight) { btnY = window.innerHeight - btnHeight; vy *= -1; }

            // 버튼 스타일에 좌표 발라주기 (중앙 정렬 해제하고 절대 좌표화)
            startBtn.style.left = btnX + 'px';
            startBtn.style.top = btnY + 'px';
            startBtn.style.transform = 'none';

            requestAnimationFrame(updateButtonPosition);
        }

        // 버튼 클릭 시 인트로 사라지는 이벤트 (스토리보드 다음 컷 전환용)
        startBtn.addEventListener('click', () => {
            startBtn.classList.add('gone');
            document.getElementById('intro').style.transition = 'opacity 1s';
            document.getElementById('intro').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro').style.display = 'none';
            }, 1000);
        });
    </script>
</body>
</html>
