<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE OPENING</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --white: #ffffff;
            --yellow: #FFF574; /* 기획안의 화사한 노란색 */
            --balck: #000000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--white); overflow: hidden; font-family: 'Press Start 2P', cursive; }

        /* 인트로 전체 컨테이너 */
        #intro {
            position: fixed;
            inset: 0;
            z-index: 50;
            background: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 픽셀 입자가 그려질 캔버스 */
        #px-canvas {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        /* 보더라인과 커서 효과 없이 정갈하게 글자만 떠다니는 스타트 버튼 */
        #start-btn {
            position: absolute;
            z-index: 10;
            background: none;
            border: none;
            color: var(--black);
            font-family: 'Press Start 2P', cursive;
            font-size: 16px;
            letter-spacing: .1em;
            padding: 15px 25px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.8s; /* 커서 올렸을 때의 transition 효과 제거 */
            text-transform: uppercase;
            /* 초기 위치 중앙 근처 */
            left: 50%;
            top: 70%;
            transform: translate(-50%, -50%);
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        #start-btn.show { opacity: 1; }
        #start-btn.gone { opacity: 0 !important; pointer-events: none; }
        
        #start-btn:hover {
            color: var(--black);
            text-shadow: none;
            background: none;
        }
    </style>
</head>
<body>

    <div id="intro">
        <canvas id="px-canvas"></canvas>
        <button id="start-btn">START</button>
    </div>

    <script>
        const canvas = document.getElementById('px-canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');

        // 창 크기에 맞게 캔버스 설정
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // --- 1. 픽셀 타이포그래피 파티클 데이터 설정 ---
        const txtCanvas = document.createElement('canvas');
        const txtCtx = txtCanvas.getContext('2d');
        
        txtCanvas.width = 240;
        txtCanvas.height = 40;
        txtCtx.font = "20px 'Press Start 2P'";
        txtCtx.fillStyle = "#000";
        txtCtx.textBaseline = "top";
        txtCtx.fillText("THE OPENING", 5, 10);

        const imgData = txtCtx.getImageData(0, 0, txtCanvas.width, txtCanvas.height);
        const particles = [];
        const pixelSize = 6; 

        // 화면 중앙 정렬을 위한 오프셋 계산
        const startX = (canvas.width - (txtCanvas.width * pixelSize)) / 2;
        const startY = (canvas.height - (txtCanvas.height * pixelSize)) / 2;

        for (let y = 0; y < txtCanvas.height; y++) {
            for (let x = 0; x < txtCanvas.width; x++) {
                const alpha = imgData.data[(y * txtCanvas.width + x) * 4 + 3];
                if (alpha > 128) {
                    particles.push({
                        x: startX + x * pixelSize,
                        y: startY + y * pixelSize,
                        size: pixelSize - 0.5,
                        // 외부 유입 대신 제자리에서 랜덤한 타이밍에 알파값(투명도)이 차오르도록 설정
                        currentAlpha: 0,
                        // 각 픽셀마다 나타나기 시작할 지연 시간(딜레이)을 랜덤하게 부여
                        delay: Math.random() * 100, 
                        fadeSpeed: Math.random() * 0.04 + 0.02
                    });
                }
            }
        }

        // --- 2. 애니메이션 루프 (제자리에서 랜덤 스폰) ---
        let animationDone = false;
        let tick = 0;

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            tick++;

            let allVisible = true;

            particles.forEach(p => {
                // 자기 딜레이 타임이 지나면 서서히 투명도를 올려서 노출시킴
                if (tick > p.delay) {
                    if (p.currentAlpha < 1) {
                        p.currentAlpha += p.fadeSpeed;
                        if (p.currentAlpha > 1) p.currentAlpha = 1;
                    }
                }

                // 아직 다 안 나타난 픽셀이 있다면 계속 애니메이션 진행
                if (p.currentAlpha < 1) {
                    allVisible = false;
                }

                // 픽셀 그리기 (투명도 적용)
                ctx.fillStyle = `rgba(255, 245, 116, ${p.currentAlpha})`;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            });

            if (!allVisible) {
                requestAnimationFrame(animateParticles);
            } else {
                animationDone = true;
                startBtn.classList.add('show');
                initButtonPhysics();
            }
        }

        setTimeout(animateParticles, 300);


        // --- 3. START 버튼 느릿느릿 무작위 부유(Bounce) 스크립트 ---
        let btnX, btnY, vx, vy;
        let btnWidth, btnHeight;

        function initButtonPhysics() {
            btnWidth = startBtn.offsetWidth;
            btnHeight = startBtn.offsetHeight;

            btnX = window.innerWidth / 2 - btnWidth / 2;
            btnY = window.innerHeight * 0.7 - btnHeight / 2;
            
            // ⚠️ 속도 값을 낮춰서 훨씬 은은하고 느리게 흘러다니도록 수정 (기존 대비 절반 이하)
            vx = (Math.random() - 0.5) * 1.2;
            vy = (Math.random() - 0.5) * 1.2;
            
            // 최소 속도 한도도 아주 낮게 조정
            if (Math.abs(vx) < 0.4) vx = vx < 0 ? -0.5 : 0.5;
            if (Math.abs(vy) < 0.4) vy = vy < 0 ? -0.5 : 0.5;

            updateButtonPosition();
        }

        function updateButtonPosition() {
            if (!animationDone) return;

            btnX += vx;
            btnY += vy;

            if (btnX <= 0) { btnX = 0; vx *= -1; }
            if (btnX + btnWidth >= window.innerWidth) { btnX = window.innerWidth - btnWidth; vx *= -1; }
            if (btnY <= 0) { btnY = 0; vy *= -1; }
            if (btnY + btnHeight >= window.innerHeight) { btnY = window.innerHeight - btnHeight; vy *= -1; }

            startBtn.style.left = btnX + 'px';
            startBtn.style.top = btnY + 'px';
            startBtn.style.transform = 'none';

            requestAnimationFrame(updateButtonPosition);
        }

        // 인트로 종료 이벤트
        startBtn.addEventListener('click', () => {
            startBtn.classList.add('gone');
            document.getElementById('intro').style.transition = 'opacity 1s';
            document.getElementById('intro').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro').style.display = 'none';
            }, 1000);
        });
    </script>
</body>
</html>
