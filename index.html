<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE OPENING</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --white: #ffffff;
            --yellow: #FFF574; /* 기획안의 화사한 노란색 */
            --teal: #0BCBCE;   /* 기획안의 스타트 버튼 민트색 */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--white); overflow: hidden; font-family: 'Press Start 2P', cursive; }

        /* 인트로 전체 컨테이너 */
        #intro {
            position: fixed;
            inset: 0;
            z-index: 50;
            background: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 픽셀 입자가 그려질 캔버스 */
        #px-canvas {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        /* 보더라인 없이 글자만 떠다니는 스타트 버튼 */
        #start-btn {
            position: absolute;
            z-index: 10;
            background: none;
            border: none; /* 보더라인 완벽 제거 */
            color: var(--teal);
            font-family: 'Press Start 2P', cursive; /* 버튼 폰트도 아케이드 스타일로 통일 */
            font-size: 14px;
            letter-spacing: .1em;
            padding: 15px 25px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.8s, transform 0.2s, color 0.2s;
            text-transform: uppercase;
            /* 초기 위치 중앙 근처 */
            left: 50%;
            top: 70%;
            transform: translate(-50%, -50%);
            outline: none;
        }
        
        #start-btn.show { opacity: 1; }
        #start-btn.gone { opacity: 0 !important; pointer-events: none; }
        
        /* 마우스 오버 시 글자 색상 반전 및 부드러운 광채 효과 */
        #start-btn:hover {
            color: #ff7ebb; /* 마우스 올렸을 때 살짝 포인트를 줄 수 있는 핑크색 (원하시면 #fff 등으로 변경 가능) */
            text-shadow: 0 0 10px rgba(255, 126, 187, 0.6);
        }
    </style>
</head>
<body>

    <div id="intro">
        <canvas id="px-canvas"></canvas>
        <button id="start-btn">START</button>
    </div>

    <script>
        const canvas = document.getElementById('px-canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');

        // 창 크기에 맞게 캔버스 설정
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // --- 1. 픽셀 타이포그래피 파티클 데이터 설정 ---
        const txtCanvas = document.createElement('canvas');
        const txtCtx = txtCanvas.getContext('2d');
        
        // 텍스트 매트릭스 추출 (Arcade 폰트 핏에 맞게 해상도 조정)
        txtCanvas.width = 240;
        txtCanvas.height = 40;
        txtCtx.font = "20px 'Press Start 2P'";
        txtCtx.fillStyle = "#000";
        txtCtx.textBaseline = "top";
        txtCtx.fillText("THE OPENING", 5, 10);

        const imgData = txtCtx.getImageData(0, 0, txtCanvas.width, txtCanvas.height);
        const particles = [];
        const pixelSize = 6; // 픽셀 크기 오프셋 (Arcade 폰트에 맞춰 조금 더 오밀조밀하게 수정)

        // 화면 중앙 정렬을 위한 오프셋 계산
        const startX = (canvas.width - (txtCanvas.width * pixelSize)) / 2;
        const startY = (canvas.height - (txtCanvas.height * pixelSize)) / 2;

        for (let y = 0; y < txtCanvas.height; y++) {
            for (let x = 0; x < txtCanvas.width; x++) {
                const alpha = imgData.data[(y * txtCanvas.width + x) * 4 + 3];
                if (alpha > 128) {
                    const angle = Math.random() * Math.PI * 2;
                    const distance = Math.max(canvas.width, canvas.height) * (Math.random() * 0.6 + 0.5);
                    
                    particles.push({
                        targetX: startX + x * pixelSize,
                        targetY: startY + y * pixelSize,
                        x: canvas.width / 2 + Math.cos(angle) * distance,
                        y: canvas.height / 2 + Math.sin(angle) * distance,
                        speed: Math.random() * 0.03 + 0.015,
                        size: pixelSize - 0.5 
                    });
                }
            }
        }

        // --- 2. 애니메이션 루프 (픽셀 모으기) ---
        let animationDone = false;

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(255, 245, 116, 1)'; // var(--yellow)

            let allArrived = true;

            particles.forEach(p => {
                const dx = p.targetX - p.x;
                const dy = p.targetY - p.y;
                
                p.x += dx * p.speed;
                p.y += dy * p.speed;

                ctx.fillRect(p.x, p.y, p.size, p.size);

                if (Math.abs(dx) > 0.5 || Math.abs(dy) > 0.5) {
                    allArrived = false;
                }
            });

            if (!allArrived) {
                requestAnimationFrame(animateParticles);
            } else {
                animationDone = true;
                startBtn.classList.add('show');
                initButtonPhysics();
            }
        }

        setTimeout(animateParticles, 300);


        // --- 3. START 버튼 무작위 부유(Bounce) 스크립트 ---
        let btnX, btnY, vx, vy;
        let btnWidth, btnHeight;

        function initButtonPhysics() {
            btnWidth = startBtn.offsetWidth;
            btnHeight = startBtn.offsetHeight;

            btnX = window.innerWidth / 2 - btnWidth / 2;
            btnY = window.innerHeight * 0.7 - btnHeight / 2;
            
            vx = (Math.random() - 0.5) * 3.5;
            vy = (Math.random() - 0.5) * 3.5;
            
            if (Math.abs(vx) < 1) vx = vx < 0 ? -1.5 : 1.5;
            if (Math.abs(vy) < 1) vy = vy < 0 ? -1.5 : 1.5;

            updateButtonPosition();
        }

        function updateButtonPosition() {
            if (!animationDone) return;

            btnX += vx;
            btnY += vy;

            if (btnX <= 0) { btnX = 0; vx *= -1; }
            if (btnX + btnWidth >= window.innerWidth) { btnX = window.innerWidth - btnWidth; vx *= -1; }
            if (btnY <= 0) { btnY = 0; vy *= -1; }
            if (btnY + btnHeight >= window.innerHeight) { btnY = window.innerHeight - btnHeight; vy *= -1; }

            startBtn.style.left = btnX + 'px';
            startBtn.style.top = btnY + 'px';
            startBtn.style.transform = 'none';

            requestAnimationFrame(updateButtonPosition);
        }

        // 인트로 종료 이벤트
        startBtn.addEventListener('click', () => {
            startBtn.classList.add('gone');
            document.getElementById('intro').style.transition = 'opacity 1s';
            document.getElementById('intro').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro').style.display = 'none';
            }, 1000);
        });
    </script>
</body>
</html>
