<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE OPENING</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --white: #ffffff;
            --yellow: #FFF574; /* 기획안의 화사한 노란색 */
            --teal: #0BCBCE;   /* 기획안의 스타트 버튼 민트색 */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--white); overflow: hidden; font-family: 'Press Start 2P', cursive; }

        /* 인트로 전체 컨테이너 */
        #intro {
            position: fixed;
            inset: 0;
            z-index: 50;
            background: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 픽셀 입자가 그려질 캔버스 */
        #px-canvas {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        /* 보더라인 없이 글자만 떠다니는 스타트 버튼 */
        #start-btn {
            position: absolute;
            z-index: 10;
            background: none;
            border: none; /* 보더라인 완벽 제거 */
            color: var(--teal);
            font-family: 'Press Start 2P', cursive; /* 버튼 폰트도 아케이드 스타일로 통일 */
            font-size: 14px;
            letter-spacing: .1em;
            padding: 15px 25px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.8s, transform 0.2s, color 0.2s;
            text-transform: uppercase;
            /* 초기 위치 중앙 근처 */
            left: 50%;
            top: 70%;
            transform: translate(-50%, -50%);
            outline: none;
        }
        
        #start-btn.show { opacity: 1; }
        #start-btn.gone { opacity: 0 !important; pointer-events: none; }
        
        /* 마우스 오버 시 글자 색상 반전 및 부드러운 광채 효과 */
        #start-btn:hover {
            color: #ff7ebb; /* 마우스 올렸을 때 살짝 포인트를 줄 수 있는 핑크색 (원하시면 #fff 등으로 변경 가능) */
            text-shadow: 0 0 10px rgba(255, 126, 187, 0.6);
        }
    </style>
</head>
<body>

        <canvas id="px-canvas"></canvas>
        <button id="start-btn">START</button>
    </div>
